<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Opening Canvas Assignment...</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; background: #f5f5f5; color: #333; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); text-align: center; max-width: 80%; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #E00122; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .btn { display: inline-block; margin-top: 20px; padding: 10px 20px; background: #E00122; color: white; text-decoration: none; border-radius: 5px; font-weight: bold; }
        p { line-height: 1.4; }
    </style>
</head>
<body>

<div class="card">
    <div class="loader"></div>
    <p>Opening Canvas App for you...</p>
    <p style="font-size: 0.85em; color: #666;">If the app doesn't open automatically, please click the button below.</p>
    <a id="web-link" href="#" class="btn">Open Web Version</a>
</div>

<script>
    // ======= CONFIGURATION =======
    var CONFIG = {
        appUrl: "canvas-courses://canvas.instructure.com/courses/13418337/pages/week-3-practice?module_item_id=145667393",
        webUrl: "https://canvas.instructure.com/courses/13418337/pages/week-3-practice?module_item_id=145667393"
    };
    // =============================

    document.getElementById('web-link').href = CONFIG.webUrl;

    // 1. Attempt to wake up the App
    window.location.href = CONFIG.appUrl;

    // 2. Smart Redirect Logic
    // If user is still on this page after 2.5 seconds, redirect to web version
    setTimeout(function() {
        if (!document.hidden) {
            window.location.href = CONFIG.webUrl;
        }
    }, 2500);

    // Handle LINE In-App Browser issue
    if (navigator.userAgent.indexOf('Line') > -1) {
        alert("Tap the button to open the Canvas App.");
    }
</script>
</body>
</html>
